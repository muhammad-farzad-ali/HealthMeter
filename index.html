<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Health tracking PWA for wellbeing monitoring">
    <title>HealthMeter</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
</head>
<body>
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Dashboard</span>
        </a>
        <a href="pages/log.html" class="nav-item">
            <span class="nav-icon">✏️</span>
            <span class="nav-label">Log</span>
        </a>
        <a href="pages/inventory.html" class="nav-item">
            <span class="nav-icon">📦</span>
            <span class="nav-label">Inventory</span>
        </a>
        <a href="pages/history.html" class="nav-item">
            <span class="nav-icon">📅</span>
            <span class="nav-label">History</span>
        </a>
        <a href="pages/settings.html" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Settings</span>
        </a>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>HealthMeter</h1>
            <p class="date-display" id="currentDate"></p>
        </header>

        <section class="summary-cards">
            <div class="card calorie-card">
                <h3>Calories</h3>
                <div class="progress-ring">
                    <svg viewBox="0 0 100 100">
                        <circle class="progress-bg" cx="50" cy="50" r="40"/>
                        <circle class="progress-fill" cx="50" cy="50" r="40" id="calorieProgress"/>
                    </svg>
                    <div class="progress-text">
                        <span id="caloriesConsumed">0</span>
                        <span class="target">/ <span id="calorieTarget">2000</span></span>
                    </div>
                </div>
            </div>

            <div class="card protein-card">
                <h3>Protein</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="proteinProgress"></div>
                </div>
                <p class="progress-text"><span id="proteinConsumed">0</span>g / <span id="proteinTarget">100</span>g</p>
            </div>
        </section>

        <section class="quick-stats">
            <div class="stat-item">
                <span class="stat-icon">👟</span>
                <span class="stat-value" id="stepsValue">0</span>
                <span class="stat-label">Steps</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">💧</span>
                <span class="stat-value" id="waterValue">0</span>
                <span class="stat-label">ml Water</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">😴</span>
                <span class="stat-value" id="sleepValue">0h</span>
                <span class="stat-label">Sleep</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">🧘</span>
                <span class="stat-value" id="meditationValue">0</span>
                <span class="stat-label">min</span>
            </div>
        </section>

        <section class="macros-summary">
            <h2>Macros</h2>
            <div class="macro-bars">
                <div class="macro-item">
                    <label>Carbs</label>
                    <div class="macro-bar">
                        <div class="macro-fill carbs" id="carbsBar" style="width: 0%"></div>
                    </div>
                    <span id="carbsValue">0g</span>
                </div>
                <div class="macro-item">
                    <label>Protein</label>
                    <div class="macro-bar">
                        <div class="macro-fill protein" id="proteinBar" style="width: 0%"></div>
                    </div>
                    <span id="proteinMacroValue">0g</span>
                </div>
                <div class="macro-item">
                    <label>Fat</label>
                    <div class="macro-bar">
                        <div class="macro-fill fat" id="fatBar" style="width: 0%"></div>
                    </div>
                    <span id="fatValue">0g</span>
                </div>
            </div>
        </section>

        <section class="recent-entries">
            <h2>Today's Entries</h2>
            <ul id="todayEntries" class="entries-list">
                <li class="empty-state">No entries yet today</li>
            </ul>
        </section>
    </main>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.error('SW registration failed:', err));
        }
    </script>
</body>
</html>
